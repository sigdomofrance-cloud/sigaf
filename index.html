<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGAF Viewer Annuaire</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
html,body{margin:0;height:100%;font-family:Arial,sans-serif}
#map{height:100vh;width:100vw}
#panel{
  position:absolute;top:12px;left:12px;z-index:1000;width:360px;max-height:80vh;
  background:#fff;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.18);overflow:hidden
}
#search{width:calc(100% - 24px);margin:12px;padding:10px;border:1px solid #bbb;border-radius:8px;font-size:14px}
#status{padding:0 12px 10px 12px;font-size:13px;color:#555}
#results{list-style:none;margin:0;padding:0;max-height:260px;overflow:auto;border-top:1px solid #eee}
#results li{padding:10px 12px;border-top:1px solid #f0f0f0;cursor:pointer}
#results li:hover{background:#f5f7fa}
.name{font-weight:700;font-size:13px}
.meta{font-size:12px;color:#666;margin-top:4px}
#debug{padding:10px 12px;border-top:1px solid #eee;background:#fafafa;font-size:12px;color:#444;white-space:pre-wrap}
</style>
</head>
<body>
<div id="panel">
  <input id="search" placeholder="Rechercher une couche...">
  <div id="status">Chargement annuaire...</div>
  <ul id="results"></ul>
  <div id="debug">Initialisation…</div>
</div>
<div id="map"></div>

<script>
const map = L.map('map').setView([44.84, -0.58], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let catalog = [];
let activeLayer = null;

const CANDIDATE_JSON_URLS = [
  './annuaire_geoservices_complet.json',
  './annuaire_geoservices_complet%20(1).json',
  './annuaire_geoservices_complet (1).json'
];

function setStatus(msg, isError=false){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isError ? '#b00020' : '#555';
}
function setDebug(msg){
  document.getElementById('debug').textContent = msg;
}
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function normalizeItem(item){
  return {
    name: item.name || item.technicalName || 'Couche',
    service: item.service || item.viewerType || '',
    theme: item.theme || '',
    serviceUrl: item.serviceUrl || item.url || '',
    technicalName: item.technicalName || item.layer || '',
    crs: item.crs || ''
  };
}
function searchText(item){
  return [
    item.name, item.technicalName, item.theme, item.service, item.serviceUrl, item.crs
  ].join(' ').toLowerCase();
}
function displayResults(list){
  const results = document.getElementById('results');
  results.innerHTML = '';
  list.slice(0, 50).forEach(item => {
    const li = document.createElement('li');
    li.innerHTML = `<div class="name">${escapeHtml(item.name)}</div>
                    <div class="meta">${escapeHtml(item.service)} · ${escapeHtml(item.technicalName)}${item.crs ? ' · '+escapeHtml(item.crs) : ''}</div>`;
    li.onclick = () => loadLayer(item);
    results.appendChild(li);
  });
}
async function loadCatalog(){
  let lastErr = null;
  for(const url of CANDIDATE_JSON_URLS){
    try{
      setStatus(`Chargement annuaire : ${url}`);
      const res = await fetch(url, {cache:'no-store'});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if(!Array.isArray(data)) throw new Error('Le JSON n’est pas un tableau');
      catalog = data.map(normalizeItem);
      setStatus(`Annuaire chargé : ${catalog.length} couches`);
      setDebug(`JSON utilisé : ${url}\nPremière couche : ${catalog[0]?.name || '—'}`);
      displayResults(catalog);
      return;
    }catch(err){
      lastErr = `${url} -> ${err.message}`;
    }
  }
  setStatus('Erreur chargement annuaire', true);
  setDebug(`Échec fetch JSON.\nDernière erreur : ${lastErr}\nVérifie que le JSON est dans le même dossier que index.html sur GitHub Pages.`);
}
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if(!q){ displayResults(catalog); return; }
  displayResults(catalog.filter(x => searchText(x).includes(q)));
});

function buildWfsUrl(item){
  const bbox = map.getBounds();
  const bbox4326 = [bbox.getWest(), bbox.getSouth(), bbox.getEast(), bbox.getNorth(), 'EPSG:4326'].join(',');
  const params = new URLSearchParams({
    SERVICE: 'WFS',
    VERSION: '2.0.0',
    REQUEST: 'GetFeature',
    typeName: item.technicalName,
    outputFormat: 'application/json',
    srsName: 'EPSG:4326',
    bbox: bbox4326
  });
  return `${item.serviceUrl}?${params.toString()}`;
}

async function loadLayer(item){
  if((item.service || '').toLowerCase() !== 'wfs' && (item.service || '').toLowerCase() !== 'wms'){
    setDebug(`La couche ${item.name} n'est pas gérée par cette version simplifiée.`);
    return;
  }
  if((item.service || '').toLowerCase() === 'wms'){
    setDebug(`Cette version simplifiée ne charge pas encore le WMS : ${item.name}`);
    return;
  }
  try{
    const url = buildWfsUrl(item);
    setStatus(`Chargement : ${item.name}`);
    setDebug(`Requête WFS : ${url}`);
    const res = await fetch(url);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if(activeLayer) map.removeLayer(activeLayer);
    activeLayer = L.geoJSON(data).addTo(map);
    try{
      map.fitBounds(activeLayer.getBounds(), {padding:[20,20]});
    }catch(e){}
    setStatus(`Couche chargée : ${item.name}`);
  }catch(err){
    setStatus(`Erreur chargement couche`, true);
    setDebug(`Erreur ${item.name}\n${err.message}`);
  }
}

loadCatalog();
</script>
</body>
</html>
